openapi: 3.0.0
info:
  title: Inventory API
  description: Manages product inventory, stock levels, warehouse locations, and category taxonomy for the ACME platform.
  version: 1.4.2
servers:
  - url: https://inventory.acme-platform.internal/v1
    description: Production
  - url: https://inventory-dev.acme-platform.internal/v1
    description: Development
security:
  - bearerAuth: []
tags:
  - name: items
  - name: stock
  - name: categories
  - name: warehouses
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: {type: string}
                  version: {type: string}
  /items:
    get:
      tags: [items]
      summary: List inventory items
      parameters:
        - name: category
          in: query
          schema: {type: string}
        - name: page
          in: query
          schema: {type: integer, default: 1}
        - name: limit
          in: query
          schema: {type: integer, default: 20}
      responses:
        '200':
          description: Paginated list of items
    post:
      tags: [items]
      summary: Create inventory item
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ItemInput'}
      responses:
        '201':
          description: Item created
  /items/{id}:
    get:
      tags: [items]
      summary: Get item by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string}
      responses:
        '200':
          description: Item details
        '404':
          description: Not found
    put:
      tags: [items]
      summary: Update item
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ItemInput'}
      responses:
        '200':
          description: Item updated
    delete:
      tags: [items]
      summary: Delete item
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string}
      responses:
        '204':
          description: Deleted
  /categories:
    get:
      tags: [categories]
      summary: List categories
      responses:
        '200':
          description: Categories list
  /stock/low:
    get:
      tags: [stock]
      summary: Get low stock items
      responses:
        '200':
          description: Items below threshold
  /stock/adjust:
    post:
      tags: [stock]
      summary: Adjust stock level
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [item_id, delta]
              properties:
                item_id: {type: string}
                delta: {type: integer}
                reason: {type: string}
      responses:
        '200':
          description: Adjustment recorded
  /warehouses:
    get:
      tags: [warehouses]
      summary: List warehouses
      responses:
        '200':
          description: Warehouses list
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    ItemInput:
      type: object
      required: [sku, name, category, quantity, price]
      properties:
        sku: {type: string}
        name: {type: string}
        category: {type: string}
        quantity: {type: integer}
        price: {type: number}

name: Postman CI
on:
  push:
    branches: ["main"]
  pull_request:
jobs:
  postman:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Postman Collection
        uses: postmanlabs/postman-cli-action@v1
        with:
          api-key: ${{ secrets.POSTMAN_API_KEY }}
          command: collection run 52238111-754b0672-0624-4dfc-b73b-429a46fe3d42 -e 52274286-33944c01-af33-4c95-abbd-ad1908b4d90b --report-events --verbose

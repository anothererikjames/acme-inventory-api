name: Postman CI
on:
  push:
    branches: ["main"]
  pull_request:
jobs:
  postman:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Postman Collection
        uses: postmanlabs/postman-cli-action@v1
        with:
          api-key: ${{ secrets.POSTMAN_API_KEY }}
          command: collection run 52274286-55dec52a-8056-40a4-92cd-76c7faab435a -e 52274286-33944c01-af33-4c95-abbd-ad1908b4d90b --report-events --verbose
